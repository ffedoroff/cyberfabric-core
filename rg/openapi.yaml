openapi: 3.1.0
info:
  title: Resource Group API
  version: 1.0.0
  description: |
    Resource Group API based on rg/api.md.
    Supports cursor pagination and OData-style query options ($filter, $orderby).

    OData:
    - Protocol: https://docs.oasis-open.org/odata/odata/v4.01/odata-v4.01-part1-protocol.html
    - $filter: https://docs.oasis-open.org/odata/odata/v4.01/odata-v4.01-part1-protocol.html#sec_SystemQueryOptionfilter
    - $orderby: https://docs.oasis-open.org/odata/odata/v4.01/odata-v4.01-part1-protocol.html#sec_SystemQueryOptionorderby

    Example types:
    ```text
      tenant (parents: ["", tenant])
      └── department (parents: [tenant])
          └── branch (parents: [department])
    ```

    Example hierarchy:
    ```text
      tenant T1 (11111111-1111-1111-1111-111111111111)
      ├── department D2 (22222222-2222-2222-2222-222222222222)
      │   ├── branch B3 (33333333-3333-3333-3333-333333333333)
      │   │   └── resource R4
      │   └── resource R5
      ├── resource R4
      ├── resource R6
      └── tenant T7 (77777777-7777-7777-7777-777777777777)
          └── resource R8
      tenant T9 (99999999-9999-9999-9999-999999999999)
      └── resource R0
    ```
servers:
  - url: https://api.example.com
security:
  - bearerAuth: []
tags:
  - name: types
    description: Resource group types
  - name: groups
    description: Resource groups
  - name: resources
    description: Resource resources bound to groups

paths:
  /api/resource-group/v1/types:
    get:
      operationId: listTypes
      tags: [types]
      summary: List resource group types
      description: |
        Returns paginated resource group types using with OData query support. Use `$orderby` and `$filter` for advanced queries.

        OData support:
        - `$orderby`:
          - `code` asc, desc
        - `$filter`:
          - `code` indexed: eq, ne, in, full scan: contains, startswith, endswith
      x-odata-orderby:
        supported_fields: [code]
        supported_directions: [asc, desc]
      x-odata-filter:
        supported_fields:
          code: [eq, ne, in, contains, startswith, endswith]
      parameters:
        - $ref: '#/components/parameters/ODataFilter'
        - $ref: '#/components/parameters/ODataOrderBy'
        - $ref: '#/components/parameters/PaginationLimit'
      responses:
        '200':
          description: Paginated list of types
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TypePage'
              example:
                items:
                  - parents: [tenant]
                    code: department
                  - parents: ['', tenant]
                    code: tenant
                  - parents: [department]
                    code: branch
                page_info:
                  limit: 50
                  next_cursor: null
                  prev_cursor: null
    post:
      operationId: createType
      tags: [types]
      summary: Create a resource group type
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTypeRequest'
            example:
              parents: [tenant]
              code: department
      responses:
        '201':
          description: Type created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Type'
              example:
                parents: [tenant]
                code: department
  /api/resource-group/v1/types/{code}:
    parameters:
      - $ref: '#/components/parameters/TypeCode'
    get:
      operationId: getType
      tags: [types]
      summary: Get a type by code
      description: |
        Returns a single resource group type by `code`.
      responses:
        '200':
          description: Type found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Type'
              example:
                parents: [tenant]
                code: department
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateType
      tags: [types]
      summary: Update a type by code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTypeRequest'
            example:
              parents: [tenant]
              code: department
      responses:
        '200':
          description: Type updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Type'
              example:
                parents: [tenant]
                code: department
    delete:
      operationId: deleteType
      tags: [types]
      summary: Delete a type by code
      responses:
        '204':
          description: Type deleted

  /api/resource-group/v1/groups:
    get:
      operationId: listGroups
      tags: [groups]
      summary: List groups with filters and pagination
      description: |
        Returns paginated resource groups using with OData query support. Use `$orderby` and `$filter` for advanced queries.

        OData support:
        - `$orderby`:
          - `group_type` asc, desc
          - `name` asc, desc
          - `parent_id` asc, desc
        - `$filter`:
          - `depth` eq, ne, gt, ge, lt, le. Could be negative e.g. `depth le -10 and depth gt 5`
          - `external_id` eq, ne, in
          - `group_type` eq, ne, in
          - `id` eq, ne, in
          - `name` indexed: eq, ne, in, full scan: contains, startswith, endswith
          - `parent_id` eq, ne, in
          - `tenant_id` eq, ne, in
          - `resources/resource_id` (eq, ne, in, contains, startswith, endswith) Real OData: `any(r: r/resource_id eq '123')`
          - `resources/resource_tenant_id` eq, ne, in
          - `resources/resource_type` eq, ne, in
      x-odata-orderby:
        supported_fields: [id, parent_id, group_type, name, tenant_id, external_id]
        supported_directions: [asc, desc]
      x-odata-filter:
        supported_fields:
          depth: [eq, ne, gt, ge, lt, le]
          id: [eq, ne, in]
          parent_id: [eq, ne, in]
          group_type: [eq, ne, in]
          name: [eq, ne, in, contains, startswith, endswith]
          tenant_id: [eq, ne, in]
          external_id: [eq, ne, in, contains, startswith, endswith]
          resources/resource_id: [eq, ne, in, contains, startswith, endswith]
          resources/resource_tenant_id: [eq, ne, in]
          resources/resource_type: [eq, ne, in]
      parameters:
        - $ref: '#/components/parameters/ODataFilter'
        - $ref: '#/components/parameters/ODataOrderBy'
        - $ref: '#/components/parameters/PaginationLimit'
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: Paginated list of groups
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupPage'
              example:
                items:
                  - external_id: D2
                    group_type: department
                    id: 22222222-2222-2222-2222-222222222222
                    name: D2
                    parent_id: 11111111-1111-1111-1111-111111111111
                    tenant_id: 11111111-1111-1111-1111-111111111111
                    resources:
                      - resource_id: 11002222-2222-2222-2222-222222222222
                        resource_tenant_id: 11111111-1111-1111-1111-111111111111
                        resource_type: user
                      - resource_id: 678
                        resource_tenant_id: 11111111-1111-1111-1111-111111111111
                        resource_type: car
                page_info:
                  limit: 50
                  next_cursor: null
                  prev_cursor: null
    post:
      operationId: createGroup
      tags: [groups]
      summary: Create a group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGroupRequest'
            example:
              external_id: D2
              group_type: department
              name: D2
              parent_id: 11111111-1111-1111-1111-111111111111
      responses:
        '201':
          description: Group created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
              example:
                external_id: D2
                group_type: department
                id: 22222222-2222-2222-2222-222222222222
                name: D2
                parent_id: 11111111-1111-1111-1111-111111111111
                tenant_id: 11111111-1111-1111-1111-111111111111
  /api/resource-group/v1/groups/{id}:
    parameters:
      - $ref: '#/components/parameters/GroupId'
    get:
      operationId: getGroup
      tags: [groups]
      summary: Get a group by id
      description: |
        Returns a single group by `id`.
      responses:
        '200':
          description: Group found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
              example:
                external_id: D2
                group_type: department
                id: 22222222-2222-2222-2222-222222222222
                name: D2
                parent_id: 11111111-1111-1111-1111-111111111111
                tenant_id: 11111111-1111-1111-1111-111111111111
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateGroup
      tags: [groups]
      summary: Update a group by id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGroupRequest'
            example:
              external_id: D2
              group_type: department
              name: D2
              parent_id: 11111111-1111-1111-1111-111111111111
      responses:
        '200':
          description: Group updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
              example:
                external_id: D2
                group_type: department
                id: 22222222-2222-2222-2222-222222222222
                name: D2
                parent_id: 11111111-1111-1111-1111-111111111111
                tenant_id: 11111111-1111-1111-1111-111111111111
    delete:
      operationId: deleteGroup
      tags: [groups]
      summary: Delete a group by id
      parameters:
        - $ref: '#/components/parameters/DeleteForce'
      responses:
        '204':
          description: Group deleted

  /api/resource-group/v1/resources:
    parameters:
      - $ref: '#/components/parameters/GroupId'
    get:
      operationId: listGroupResources
      tags: [resources]
      summary: List resources bound to a group
      description: |
        Returns paginated resources bound to a group using with OData query support. Use `$orderby` and `$filter` for advanced queries.

        OData support:
        - `$filter`:
          - `resource_id` eq, ne, in
          - `resource_type` eq, ne, in
      x-odata-orderby:
        supported_fields: [resource_id, resource_type, tenant_id]
        supported_directions: [asc, desc]
      x-odata-filter:
        supported_fields:
          resource_id: [eq, ne, in, contains, startswith, endswith]
          resource_type: [eq, ne, in]
          tenant_id: [eq, ne, in]
      parameters:
        - $ref: '#/components/parameters/ODataFilter'
        - $ref: '#/components/parameters/ODataOrderBy'
        - $ref: '#/components/parameters/PaginationCursor'
        - $ref: '#/components/parameters/PaginationLimit'
      responses:
        '200':
          description: Paginated resources
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MembershipPage'
              example:
                items:
                  - group_id: 33333333-3333-3333-3333-333333333333
                    resource_id: R4
                    resource_type: resource
                    tenant_id: 11111111-1111-1111-1111-111111111111
                page_info:
                  limit: 50
                  next_cursor: null
                  prev_cursor: null
    post:
      operationId: addGroupMembership
      tags: [resources]
      summary: Attach membership to a group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMembershipRequest'
            example:
              resource_id: R4
              resource_type: resource
              tenant_id: 11111111-1111-1111-1111-111111111111
      responses:
        '201':
          description: Membership attached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Membership'
              example:
                group_id: 33333333-3333-3333-3333-333333333333
                resource_id: R4
                resource_type: resource
                tenant_id: 11111111-1111-1111-1111-111111111111
    delete:
      operationId: deleteGroupMembership
      tags: [resources]
      summary: Detach membership from a group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteMembershipRequest'
            example:
              resource_id: R4
              resource_type: resource
              tenant_id: 11111111-1111-1111-1111-111111111111
      responses:
        '204':
          description: Membership detached

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    GroupId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      example: 22222222-2222-2222-2222-222222222222

    TypeCode:
      name: code
      in: path
      required: true
      schema:
        type: string
      example: department

    TenantId:
      name: tenant_id
      in: query
      required: false
      schema:
        type: string
        format: uuid
      example: 11111111-1111-1111-1111-111111111111

    DeleteForce:
      name: force
      in: query
      required: false
      schema:
        type: boolean
        default: false
      example: false

    PaginationLimit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 300
        default: 50
      example: 50

    ODataOrderBy:
      name: $orderby
      in: query
      required: false
      description: OData v4.01 ordering expression.
      schema:
        type: string

    ODataFilter:
      name: $filter
      in: query
      required: false
      description: |
        OData v4.01 filter expression.
      schema:
        type: string

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            detail: Requested entity does not exist
            status: 404
            title: Resource not found
            trace_id: 01HXYZRGNOTFOUND
            type: https://api.example.com/errors/not-found

  schemas:
    Problem:
      type: object
      properties:
        type: { type: string }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        trace_id: { type: string }
      example:
        detail: Requested entity does not exist
        status: 404
        title: Resource not found
        trace_id: 01HXYZRGNOTFOUND
        type: https://api.example.com/errors/not-found

    PageInfo:
      type: object
      required: [limit]
      properties:
        limit:
          type: integer
        next_cursor:
          type: [string, 'null']
        prev_cursor:
          type: [string, 'null']
      example:
        limit: 50
        next_cursor: null
        prev_cursor: null

    Type:
      type: object
      required: [code, parents]
      properties:
        code:
          type: string
          example: department
        parents:
          type: array
          items:
            type: string
          example: [tenant]

    TypePage:
      type: object
      required: [items, page_info]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Type'
        page_info:
          $ref: '#/components/schemas/PageInfo'
      example:
        items:
          - parents: ['', tenant]
            code: tenant
          - parents: [tenant]
            code: department
          - parents: [department]
            code: branch
        page_info:
          limit: 50
          next_cursor: null
          prev_cursor: null

    CreateTypeRequest:
      type: object
      required: [code, parents]
      properties:
        code:
          type: string
          example: department
        parents:
          type: array
          items:
            type: string
          example: [tenant]

    UpdateTypeRequest:
      type: object
      required: [code, parents]
      properties:
        code:
          type: string
          example: department
        parents:
          type: array
          items:
            type: string
          example: [tenant]

    Group:
      type: object
      required: [id, group_type, name, tenant_id]
      properties:
        id:
          type: string
          format: uuid
          example: 22222222-2222-2222-2222-222222222222
        parent_id:
          type: [string, 'null']
          format: uuid
          example: 11111111-1111-1111-1111-111111111111
        group_type:
          type: string
          example: department
        name:
          type: string
          example: D2
        tenant_id:
          type: string
          format: uuid
          example: 11111111-1111-1111-1111-111111111111
        external_id:
          type: [string, 'null']
          example: D2

    GroupPage:
      type: object
      required: [items, page_info]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Group'
        page_info:
          $ref: '#/components/schemas/PageInfo'
      example:
        items:
          - external_id: D2
            group_type: department
            id: 22222222-2222-2222-2222-222222222222
            name: D2
            parent_id: 11111111-1111-1111-1111-111111111111
            tenant_id: 11111111-1111-1111-1111-111111111111
        page_info:
          limit: 50
          next_cursor: null
          prev_cursor: null

    CreateGroupRequest:
      type: object
      required: [group_type, name, tenant_id]
      properties:
        group_type:
          type: string
          example: department
        name:
          type: string
          example: D2
        parent_id:
          type: [string, 'null']
          format: uuid
          example: 11111111-1111-1111-1111-111111111111
        tenant_id:
          type: string
          format: uuid
          example: 11111111-1111-1111-1111-111111111111
        external_id:
          type: [string, 'null']
          example: D2

    UpdateGroupRequest:
      type: object
      required: [id, group_type, name, tenant_id]
      properties:
        id:
          type: string
          format: uuid
          example: 22222222-2222-2222-2222-222222222222
        group_type:
          type: string
          example: department
        name:
          type: string
          example: D2
        parent_id:
          type: [string, 'null']
          format: uuid
          example: 11111111-1111-1111-1111-111111111111
        tenant_id:
          type: string
          format: uuid
          example: 11111111-1111-1111-1111-111111111111
        external_id:
          type: [string, 'null']
          example: D2

    Membership:
      type: object
      required: [group_id, resource_id, resource_type, tenant_id]
      properties:
        group_id:
          type: string
          format: uuid
          example: 33333333-3333-3333-3333-333333333333
        resource_id:
          type: string
          example: R4
        resource_type:
          type: string
          example: resource
        tenant_id:
          type: string
          format: uuid
          example: 11111111-1111-1111-1111-111111111111

    MembershipPage:
      type: object
      required: [items, page_info]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Membership'
        page_info:
          $ref: '#/components/schemas/PageInfo'
      example:
        items:
          - group_id: 33333333-3333-3333-3333-333333333333
            resource_id: R4
            resource_type: resource
            tenant_id: 11111111-1111-1111-1111-111111111111
        page_info:
          limit: 50
          next_cursor: null
          prev_cursor: null

    CreateMembershipRequest:
      type: object
      required: [resource_id, resource_type, tenant_id]
      properties:
        resource_id:
          type: string
          example: R4
        resource_type:
          type: string
          example: resource
        tenant_id:
          type: string
          format: uuid
          example: 11111111-1111-1111-1111-111111111111

    DeleteMembershipRequest:
      type: object
      required: [resource_id, resource_type, tenant_id]
      properties:
        resource_id:
          type: string
          example: R4
        resource_type:
          type: string
          example: resource
        tenant_id:
          type: string
          format: uuid
          example: 11111111-1111-1111-1111-111111111111
